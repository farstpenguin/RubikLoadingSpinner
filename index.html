<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rubik's Cube Spinner — Playground</title>
<!--
  Rubik's-cube loading spinner — playground (runs from this single file).
  Tweak the values on the right while watching the live preview, then use
  "Copy code" to grab an embed snippet with your settings. Component JS is inlined.
  Colors use presets + hex input (no native OS color dialog).
-->
<style>
  :root{
    --body-bg:#14161a; --panel-bg:#1c1f26; --stage-bg:#0f1115;
    --ink:#e7e9ee; --muted:#8b919c; --line:#2a2e37; --accent:#4c8bf5; --ok:#2fbf71;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:var(--body-bg);color:var(--ink);
    font-family:"Avenir Next","Helvetica Neue",system-ui,sans-serif;
    display:flex;min-height:100%}
  .stage{flex:1;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(120% 120% at 50% 40%, #16181d 0%, var(--stage-bg) 70%);
    position:relative;overflow:hidden;min-width:0}
  #host{display:flex;align-items:center;justify-content:center}
  .hint{position:absolute;bottom:18px;left:0;right:0;text-align:center;
    font-size:11px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase}

  .panel{width:340px;flex-shrink:0;background:var(--panel-bg);
    border-left:1px solid var(--line);padding:24px 22px;overflow-y:auto;
    display:flex;flex-direction:column;gap:22px}
  .panel h1{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px}
  .panel h1 .dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}
  .sec-title{font-size:11px;letter-spacing:.16em;text-transform:uppercase;
    color:var(--muted);margin-bottom:-6px}
  .field{display:flex;flex-direction:column;gap:8px}
  .field .lab{display:flex;justify-content:space-between;align-items:baseline;
    font-size:12px;color:var(--muted);letter-spacing:.03em}
  .field .lab .val{color:var(--ink);font-variant-numeric:tabular-nums;font-size:13px}
  input[type=range]{-webkit-appearance:none;appearance:none;height:4px;border-radius:4px;
    background:var(--line);outline:none}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;
    border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid var(--panel-bg)}
  input[type=range]::-moz-range-thumb{width:16px;height:16px;border-radius:50%;
    background:var(--accent);cursor:pointer;border:2px solid var(--panel-bg)}
  .toggle{display:flex;align-items:center;justify-content:space-between;font-size:13px}
  .toggle input{width:38px;height:22px;-webkit-appearance:none;appearance:none;
    background:var(--line);border-radius:100px;position:relative;cursor:pointer;transition:.2s}
  .toggle input:checked{background:var(--accent)}
  .toggle input::after{content:"";position:absolute;width:16px;height:16px;border-radius:50%;
    background:#fff;top:3px;left:3px;transition:.2s}
  .toggle input:checked::after{left:19px}
  .divider{height:1px;background:var(--line)}

  .seg{display:flex;gap:6px}
  .seg button{flex:1;font:inherit;font-size:12px;padding:8px 6px;border-radius:7px;
    border:1px solid var(--line);background:transparent;color:var(--muted);cursor:pointer;transition:.15s}
  .seg button.on{border-color:var(--accent);color:var(--accent);background:rgba(76,139,245,.08)}

  .logo-body{display:flex;flex-direction:column;gap:14px}
  input[type=text], textarea{font:inherit;font-size:13px;background:var(--stage-bg);
    color:var(--ink);border:1px solid var(--line);border-radius:7px;padding:9px 10px;outline:none;width:100%}
  input[type=text]:focus, textarea:focus{border-color:var(--accent)}
  input[type=text].bad{border-color:#c0554e}
  textarea{resize:vertical;min-height:88px;font-family:"SF Mono",Menlo,monospace;font-size:11px;line-height:1.5}

  .swatches{display:flex;gap:7px;flex-wrap:wrap}
  .swatch{width:26px;height:26px;border-radius:7px;cursor:pointer;
    border:2px solid transparent;box-shadow:inset 0 0 0 1px rgba(255,255,255,.12);padding:0;transition:.12s}
  .swatch.on{border-color:var(--accent)}
  .hexrow{display:flex;align-items:center;gap:8px}
  .hexrow .sw-preview{width:26px;height:26px;border-radius:7px;flex-shrink:0;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.15)}
  .hexrow input[type=text]{font-family:"SF Mono",Menlo,monospace}

  .code-wrap{display:flex;flex-direction:column;gap:10px}
  #code{min-height:120px;white-space:pre;overflow-x:auto}
  .actions{display:flex;gap:10px}
  button.act{flex:1;font:inherit;font-size:13px;padding:11px;border-radius:8px;
    border:1px solid var(--line);background:transparent;color:var(--ink);cursor:pointer;
    transition:.15s;letter-spacing:.02em}
  button.act:hover{border-color:var(--accent);color:var(--accent)}
  button.act.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  button.act.primary:hover{opacity:.9;color:#fff}
  button.act.copied{background:var(--ok);border-color:var(--ok);color:#fff}
</style>
</head>
<body>

<div class="stage">
  <div id="host"></div>
  <div class="hint">Live Preview</div>
</div>

<aside class="panel">
  <h1><span class="dot"></span>Spinner Playground</h1>

  <div class="field">
    <div class="lab">Size <span class="val" id="vsize">160 px</span></div>
    <input type="range" id="size" min="48" max="360" step="4" value="160">
  </div>
  <div class="field">
    <div class="lab">Turn duration <span class="val" id="vspeed">260 ms</span></div>
    <input type="range" id="speed" min="80" max="700" step="10" value="260">
  </div>
  <div class="field">
    <div class="lab">Gap between moves <span class="val" id="vgap">60 ms</span></div>
    <input type="range" id="gap" min="0" max="200" step="10" value="60">
  </div>
  <div class="field">
    <div class="lab">Scramble moves <span class="val" id="vmoves">10</span></div>
    <input type="range" id="moves" min="1" max="40" step="1" value="10">
  </div>

  <div class="toggle"><label for="orbit">Idle rotation</label>
    <input type="checkbox" id="orbit" checked></div>

  <div class="divider"></div>

  <div class="sec-title">Front logo</div>
  <div class="seg" id="logoMode">
    <button data-mode="none" class="on">None</button>
    <button data-mode="text">Text / Emoji</button>
    <button data-mode="svg">Paste SVG</button>
  </div>

  <div class="logo-body" id="textBody" style="display:none">
    <div class="field">
      <div class="lab">Character / Emoji</div>
      <input type="text" id="logoText" value="😃" placeholder="😃 or K, etc.">
    </div>
    <div class="field">
      <div class="lab">Background color</div>
      <div class="swatches" id="bgSwatches"></div>
      <div class="hexrow"><span class="sw-preview" id="bgPreview"></span>
        <input type="text" id="bgHex" value="#f5f5f0" spellcheck="false"></div>
    </div>
    <div class="field">
      <div class="lab">Text color</div>
      <div class="swatches" id="fgSwatches"></div>
      <div class="hexrow"><span class="sw-preview" id="fgPreview"></span>
        <input type="text" id="fgHex" value="#111111" spellcheck="false"></div>
    </div>
  </div>

  <div class="logo-body" id="svgBody" style="display:none">
    <div class="field">
      <div class="lab">Paste SVG (square recommended)</div>
      <textarea id="logoSvg" placeholder="&lt;svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'&gt;...&lt;/svg&gt;"></textarea>
    </div>
  </div>

  <div class="actions" style="margin-top:2px">
    <button class="act" id="clearLogo">Clear logo</button>
    <button class="act" id="resetAll">Reset all</button>
  </div>

  <div class="divider"></div>

  <div class="sec-title">Embed code</div>
  <div class="code-wrap">
    <textarea id="code" readonly></textarea>
    <div class="actions">
      <button class="act" id="copyTag">Tag only</button>
      <button class="act primary" id="copyAll">Copy code</button>
    </div>
  </div>
</aside>

<script>
/*!
 * rubiks-spinner.js — ルービックキューブ型ローディングスピナー
 *
 * ■ 使い方（置くだけ）
 *   1. このファイルを読み込む:
 *        <script src="rubiks-spinner.js"><\/script>
 *   2. 表示したい場所にタグを置く:
 *        <rubiks-spinner></rubiks-spinner>
 *
 * ■ 属性（すべて省略可）
 *   size="48"         表示サイズpx（正方形）。デフォルト 48
 *   speed="300"       1手の回転時間ms。小さいほど速い。デフォルト 300
 *   gap="60"          手と手の間の待機ms。デフォルト 60
 *   moves="10"        スクランブル手数。デフォルト 10
 *   no-orbit          自転を止めて正面視（真正面固定）にする。
 *                     このとき完全に隠れる手は自動で除外される。
 *   logo="logo.svg"   前面（緑の面）に画像を9分割で表示する。
 *                     SVG/PNGなどURL指定可（データURIも可）。正方形画像推奨。
 *                     揃うとロゴが完成し、スクランブル中はバラバラになる。
 *
 * ■ 絵文字をロゴにする
 *   SVGの<text>に絵文字を1文字入れたデータURIを logo に渡せばよい。
 *   ロゴ画像は背景ごとステッカーを覆うため、面の色はSVG内 rect の fill で
 *   自由に決められる。文字・絵文字は白地(#f5f5f0)がおすすめ:
 *     const logoURI = "data:image/svg+xml;utf8," + encodeURIComponent(
 *       `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>` +
 *       `<rect width='100' height='100' fill='#f5f5f0'/>` +
 *       `<text x='50' y='54' font-size='72' text-anchor='middle' ` +
 *       `dominant-baseline='central'>😃</text></svg>`);
 *     sp.setAttribute('logo', logoURI);
 *   注意: 絵文字はOSのフォントで描画されるため、環境により絵柄が変わる
 *   （Mac/iOS=Apple Color Emoji, Windows=Segoe UI Emoji）。
 *   全環境で同じ見た目にしたい場合は Twemoji などの絵文字SVGファイルを
 *   logo に直接指定する。
 *
 *   例: <rubiks-spinner size="48" speed="200" no-orbit></rubiks-spinner>
 *
 * ■ 表示/非表示
 *   通常のDOM要素なので display:none / remove() で消せば
 *   アニメーションも自動停止します（切断時にループを止めます）。
 *
 *   例（fetch中だけ表示）:
 *     const sp = document.createElement('rubiks-spinner');
 *     document.body.appendChild(sp);
 *     await fetch(...);
 *     sp.remove();
 *
 * ■ 依存なし / Shadow DOM使用（外部CSSと干渉しません）
 * ■ prefers-reduced-motion 時は自転を止め、手の回転を高速化します
 */
(() => {
  const TMPL = `
  <style>
    :host{
      display:inline-block;
      width:var(--size,120px);
      height:var(--size,120px);
    }
    .vp{width:100%;height:100%;perspective:calc(var(--size,120px)*5)}
    .space{
      width:100%;height:100%;
      transform-style:preserve-3d;
      transform:rotateX(-26deg) rotateY(-30deg);
    }
    .space.orbit{animation:orbit 14s linear infinite}
    @keyframes orbit{
      from{transform:rotateX(-26deg) rotateY(-30deg)}
      to  {transform:rotateX(-26deg) rotateY(330deg)}
    }
    .cubelet{
      position:absolute;left:50%;top:50%;
      width:var(--s);height:var(--s);
      margin-left:calc(var(--s)/-2);
      margin-top:calc(var(--s)/-2);
      transform-style:preserve-3d;
    }
    .face{
      position:absolute;inset:0;
      background:var(--plastic,#0b0c0e);
      border-radius:12%;
      border:1px solid var(--plastic,#0b0c0e);
      backface-visibility:hidden;
    }
    .face::after{
      content:"";position:absolute;inset:7%;border-radius:14%;
      background:var(--fc,var(--plastic,#0b0c0e));
    }
    /* ロゴ面: ステッカーの上に9分割した画像タイルを重ねる */
    .face.logo::after{
      background-image:var(--logo);
      background-size:300% 300%;
      background-position:var(--lp);
      background-repeat:no-repeat;
    }
    .fU{transform:rotateX( 90deg) translateZ(calc(var(--s)/2))}
    .fD{transform:rotateX(-90deg) translateZ(calc(var(--s)/2))}
    .fF{transform:              translateZ(calc(var(--s)/2))}
    .fB{transform:rotateY(180deg) translateZ(calc(var(--s)/2))}
    .fR{transform:rotateY( 90deg) translateZ(calc(var(--s)/2))}
    .fL{transform:rotateY(-90deg) translateZ(calc(var(--s)/2))}
    @media (prefers-reduced-motion: reduce){
      .space.orbit{animation:none}
    }
  </style>
  <div class="vp"><div class="space"></div></div>`;

  const COLORS = {
    U:'#f5f5f0', D:'#ffd500', F:'#009b48',
    B:'#0046ad', R:'#b71234', L:'#ff5800'
  };

  class RubiksSpinner extends HTMLElement {
    connectedCallback(){
      const size  = parseInt(this.getAttribute('size'))  || 48;
      this._speed = parseInt(this.getAttribute('speed')) || 300;
      this._moves = parseInt(this.getAttribute('moves')) || 10;
      const gapAttr = parseInt(this.getAttribute('gap'));
      this._gap = Number.isNaN(gapAttr) ? 60 : gapAttr;   // 手間の待機ms
      const logo  = this.getAttribute('logo');
      this._reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;

      const root = this.attachShadow({mode:'open'});
      root.innerHTML = TMPL;
      this.style.setProperty('--size', size+'px');

      const space = root.querySelector('.space');
      this._frontView = this.hasAttribute('no-orbit');
      if (this._frontView) space.style.transform = 'none';   // 正面視で静止
      else space.classList.add('orbit');

      // cubelet size: cube spans ~3.15 units of S within the box
      const S = size / 3.15;
      const STEP = S * 1.035; // small gap

      // ロゴ指定時は前面が白地ロゴになるため、上面(白)と前面(緑)の色を
      // 入れ替えて白が2面にならないようにする
      const C = logo ? {...COLORS, U:COLORS.F, F:COLORS.U} : COLORS;

      this._cubelets = [];
      for (let x=-1;x<=1;x++) for (let y=-1;y<=1;y++) for (let z=-1;z<=1;z++){
        if (!x && !y && !z) continue;
        const el = document.createElement('div');
        el.className = 'cubelet';
        el.style.setProperty('--s', S+'px');
        const st = {fU:y===-1&&C.U, fD:y===1&&C.D, fF:z===1&&C.F,
                    fB:z===-1&&C.B, fR:x===1&&C.R, fL:x===-1&&C.L};
        for (const [cls,col] of Object.entries(st)){
          const f = document.createElement('div');
          f.className = 'face '+cls;
          if (col) f.style.setProperty('--fc', col);
          // 前面(z=1)のステッカーにロゴを9分割で貼る
          if (logo && cls==='fF' && z===1){
            f.classList.add('logo');
            f.style.setProperty('--logo', `url("${logo}")`);
            // x:-1→0%(左) 0→50% 1→100%(右) / y:-1→0%(上) 0→50% 1→100%(下)
            f.style.setProperty('--lp', `${(x+1)*50}% ${(y+1)*50}%`);
          }
          el.appendChild(f);
        }
        space.appendChild(el);
        const m = new DOMMatrix().translate(x*STEP, y*STEP, z*STEP);
        el.style.transform = m.toString();
        this._cubelets.push({el, x, y, z, m});
      }

      this._alive = true;
      this._run();
    }

    disconnectedCallback(){ this._alive = false; }

    /* ---- internals ---- */

    _axisRot(axis, deg){
      const r = new DOMMatrix();
      if (axis==='x') return r.rotateAxisAngle(1,0,0,deg);
      if (axis==='y') return r.rotateAxisAngle(0,1,0,deg);
      return r.rotateAxisAngle(0,0,1,deg);
    }

    _rotCoord(c, axis, dir){
      const {x,y,z} = c;
      if (axis==='x'){ c.y = dir>0 ? -z :  z; c.z = dir>0 ?  y : -y; }
      if (axis==='y'){ c.x = dir>0 ?  z : -z; c.z = dir>0 ? -x :  x; }
      if (axis==='z'){ c.x = dir>0 ? -y :  y; c.y = dir>0 ?  x : -x; }
    }

    _doMove(axis, layer, dir){
      return new Promise(res => {
        const group = this._cubelets.filter(c => c[axis] === layer);
        const dur = this._reduced ? 40 : this._speed;
        const ease = t => t<.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2;
        const t0 = performance.now();
        const tick = now => {
          if (!this._alive) return res();
          const t = Math.min((now-t0)/dur, 1);
          const R = this._axisRot(axis, ease(t)*90*dir);
          for (const c of group) c.el.style.transform = R.multiply(c.m).toString();
          if (t < 1) requestAnimationFrame(tick);
          else {
            const R90 = this._axisRot(axis, 90*dir);
            for (const c of group){
              c.m = R90.multiply(c.m);
              c.el.style.transform = c.m.toString();
              this._rotCoord(c, axis, dir);
            }
            res();
          }
        };
        requestAnimationFrame(tick);
      });
    }

    async _run(){
      const sleep = ms => new Promise(r=>setTimeout(r,ms));
      const rand = a => a[Math.floor(Math.random()*a.length)];
      const AXES = ['x','y','z'];
      const randomMove = prev => {
        // 正面視(no-orbit)だと前面レイヤー以外のz軸回転は完全に隠れる
        const isHidden = (axis, layer) => axis==='z' && layer!==1;
        let axis, layer, dir;
        do {
          axis = rand(AXES); layer = rand([-1,0,1]); dir = rand([1,-1]);
        } while (
          (prev && axis===prev.axis && layer===prev.layer && dir===-prev.dir) ||
          (this._frontView && isHidden(axis, layer))
        );
        return {axis, layer, dir};
      };

      await sleep(400);
      while (this._alive){
        const n = this._moves || (5 + Math.floor(Math.random()*3));
        const moves = [];
        let prev = null;
        for (let i=0;i<n && this._alive;i++){
          const mv = randomMove(prev);
          moves.push(mv); prev = mv;
          await this._doMove(mv.axis, mv.layer, mv.dir);
          await sleep(this._gap);
        }
        await sleep(400);
        for (let i=moves.length-1;i>=0 && this._alive;i--){
          const mv = moves[i];
          await this._doMove(mv.axis, mv.layer, -mv.dir);
          await sleep(this._gap);
        }
        await sleep(600);
      }
    }
  }

  customElements.define('rubiks-spinner', RubiksSpinner);
})();

</script>
<script>
(() => {
  const $ = id => document.getElementById(id);
  const host = $('host');

  const DEFAULTS = {
    size:160, speed:260, gap:60, moves:10, orbit:true,
    logoMode:'none', text:'😃', bg:'#f5f5f0', fg:'#111111', svg:''
  };
  let cfg = {...DEFAULTS};

  const BG_PRESETS = ['#f5f5f0','#009b48','#0046ad','#b71234','#ffd500','#ff5800','#14161a'];
  const FG_PRESETS = ['#111111','#f5f5f0','#009b48','#0046ad','#b71234','#ffd500'];
  const HEX_RE = /^#([0-9a-fA-F]{3}|[0-9a-fA-F]{6})$/;

  const safeEncode = s => {
    try { return encodeURIComponent(s); }
    catch(_){
      try { return encodeURIComponent(s.replace(/[\uD800-\uDFFF]/g,'')); }
      catch(__){ return ''; }
    }
  };
  const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  function buildTextSvg(){
    return `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>`
      + `<rect width='100' height='100' fill='${cfg.bg}'/>`
      + `<text x='50' y='54' font-family='Helvetica,Arial,sans-serif' font-size='64' `
      + `font-weight='800' fill='${cfg.fg}' text-anchor='middle' `
      + `dominant-baseline='central'>${esc(cfg.text)}</text></svg>`;
  }
  function currentSvg(){
    if (cfg.logoMode==='text'){
      if (!cfg.text || !cfg.text.trim()) return '';
      return buildTextSvg();
    }
    if (cfg.logoMode==='svg') return cfg.svg.trim();
    return '';
  }
  function currentLogoURI(){
    const svg = currentSvg();
    if (!svg) return '';
    const enc = safeEncode(svg);
    return enc ? 'data:image/svg+xml;utf8,' + enc : '';
  }

  function tagText(){
    const attrs = [`size="${cfg.size}"`,`speed="${cfg.speed}"`,`gap="${cfg.gap}"`,`moves="${cfg.moves}"`];
    if (!cfg.orbit) attrs.push('no-orbit');
    const uri = currentLogoURI();
    let tag = `<rubiks-spinner ${attrs.join(' ')}`;
    if (uri) tag += `\n  logo="${uri}"`;
    tag += `></rubiks-spinner>`;
    return tag;
  }
  const fullText = () => `<script src="rubiks-spinner.js"><\/script>\n` + tagText();
  function updateCode(){ try { $('code').value = fullText(); } catch(_){} }

  let renderTimer = null;
  function render(){
    try {
      host.innerHTML = '';
      const el = document.createElement('rubiks-spinner');
      el.setAttribute('size', cfg.size);
      el.setAttribute('speed', cfg.speed);
      el.setAttribute('gap', cfg.gap);
      el.setAttribute('moves', cfg.moves);
      if (!cfg.orbit) el.setAttribute('no-orbit','');
      const uri = currentLogoURI();
      if (uri) el.setAttribute('logo', uri);
      host.appendChild(el);
    } catch(err){ console.warn('render skipped:', err); }
    updateCode();
  }
  function renderSoon(){ clearTimeout(renderTimer); renderTimer = setTimeout(render, 120); }

  async function copy(text, btn){
    let ok = false;
    try { await navigator.clipboard.writeText(text); ok = true; }
    catch(e){
      try {
        const ta = document.createElement('textarea');
        ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
        document.body.appendChild(ta); ta.select();
        ok = document.execCommand('copy'); document.body.removeChild(ta);
      } catch(_){ ok = false; }
    }
    const orig = btn.textContent;
    btn.textContent = ok ? 'Copied ✓' : 'Select & copy manually';
    btn.classList.toggle('copied', ok);
    if (!ok){ const c=$('code'); c.focus(); c.select(); }
    setTimeout(()=>{ btn.textContent = orig; btn.classList.remove('copied'); }, 1600);
  }

  function buildSwatches(containerId, presets, which){
    const box = $(containerId);
    box.innerHTML = '';
    presets.forEach(hex=>{
      const b = document.createElement('button');
      b.className='swatch'; b.type='button';
      b.style.background=hex; b.title=hex; b.dataset.hex=hex;
      b.addEventListener('click', ()=> setColor(which, hex, true));
      box.appendChild(b);
    });
  }
  function markSwatch(containerId, hex){
    $(containerId).querySelectorAll('.swatch')
      .forEach(s => s.classList.toggle('on', s.dataset.hex.toLowerCase()===hex.toLowerCase()));
  }
  function setColor(which, hex, fromSwatch){
    if (!HEX_RE.test(hex)) return;
    cfg[which] = hex;
    const isBg = which==='bg';
    const hexInput = $(isBg?'bgHex':'fgHex');
    const preview  = $(isBg?'bgPreview':'fgPreview');
    if (fromSwatch) hexInput.value = hex;
    hexInput.classList.remove('bad');
    preview.style.background = hex;
    markSwatch(isBg?'bgSwatches':'fgSwatches', hex);
    renderSoon();
  }
  function wireHex(inputId, which){
    const el = $(inputId);
    el.addEventListener('input', ()=>{
      let v = el.value.trim();
      if (v && v[0] !== '#') v = '#'+v;
      if (HEX_RE.test(v)) setColor(which, v, false);
      else el.classList.add('bad');
    });
  }

  function setMode(mode){
    cfg.logoMode = mode;
    document.querySelectorAll('#logoMode button')
      .forEach(x => x.classList.toggle('on', x.dataset.mode===mode));
    $('textBody').style.display = mode==='text' ? 'flex' : 'none';
    $('svgBody').style.display  = mode==='svg'  ? 'flex' : 'none';
  }

  function syncControls(){
    $('size').value=cfg.size;   $('vsize').textContent=cfg.size+' px';
    $('speed').value=cfg.speed; $('vspeed').textContent=cfg.speed+' ms';
    $('gap').value=cfg.gap;     $('vgap').textContent=cfg.gap+' ms';
    $('moves').value=cfg.moves; $('vmoves').textContent=String(cfg.moves);
    $('orbit').checked=cfg.orbit;
    $('logoText').value=cfg.text;
    $('bgHex').value=cfg.bg; $('bgHex').classList.remove('bad'); $('bgPreview').style.background=cfg.bg;
    $('fgHex').value=cfg.fg; $('fgHex').classList.remove('bad'); $('fgPreview').style.background=cfg.fg;
    markSwatch('bgSwatches',cfg.bg); markSwatch('fgSwatches',cfg.fg);
    $('logoSvg').value=cfg.svg;
    setMode(cfg.logoMode);
  }

  const fmt = { size:v=>v+' px', speed:v=>v+' ms', gap:v=>v+' ms', moves:v=>String(v) };
  ['size','speed','gap','moves'].forEach(k=>{
    const el = $(k);
    el.addEventListener('input', ()=>{
      cfg[k] = +el.value; $('v'+k).textContent = fmt[k](el.value);
      updateCode(); renderSoon();
    });
  });
  $('orbit').addEventListener('change', e=>{ cfg.orbit = e.target.checked; render(); });

  document.querySelectorAll('#logoMode button').forEach(b=>{
    b.addEventListener('click', ()=>{ setMode(b.dataset.mode); render(); });
  });
  $('logoText').addEventListener('input', e=>{ cfg.text = e.target.value; renderSoon(); });
  $('logoSvg').addEventListener('input', e=>{ cfg.svg = e.target.value; renderSoon(); });

  buildSwatches('bgSwatches', BG_PRESETS, 'bg');
  buildSwatches('fgSwatches', FG_PRESETS, 'fg');
  wireHex('bgHex','bg');
  wireHex('fgHex','fg');

  $('clearLogo').addEventListener('click', ()=>{
    cfg.logoMode='none'; cfg.text=''; cfg.svg='';
    $('logoText').value=''; $('logoSvg').value='';
    setMode('none'); render();
  });
  $('resetAll').addEventListener('click', ()=>{ cfg = {...DEFAULTS}; syncControls(); render(); });

  $('copyAll').addEventListener('click', e=> copy(fullText(), e.currentTarget));
  $('copyTag').addEventListener('click', e=> copy(tagText(), e.currentTarget));

  $('bgPreview').style.background = cfg.bg;
  $('fgPreview').style.background = cfg.fg;
  markSwatch('bgSwatches', cfg.bg);
  markSwatch('fgSwatches', cfg.fg);
  render();
})();

</script>
</body>
</html>
